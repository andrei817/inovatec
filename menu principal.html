    content: '';

    transition: transform 0.3s ease;
}

    transform: scaleX(1);
    transform-origin: bottom left;
}

   <script> 
   // Função para abrir a sidebar
   function abrirSidebar() {
       // Se for um dispositivo móvel, ocupa 100% da tela; caso contrário, 250px
       if (window.innerWidth <= 768) {
           document.getElementById("mySidebar").style.width = "100%";
       } else {
           document.getElementById("mySidebar").style.width = "310px";
       }
   }

   // Função para fechar a sidebar
   function fecharSidebar() {
       document.getElementById("mySidebar").style.width = "0";
   }

   // Função para fechar a sidebar ao clicar em um item do menu
   function configurarLinksSidebar() {
       // Seleciona todos os links dentro da sidebar
       const links = document.querySelectorAll('#mySidebar a');
       links.forEach(link => {
           link.addEventListener('click', fecharSidebar); // Adiciona o evento de clique
       });
   }

   // Configurar os eventos após a página ser carregada
   document.addEventListener('DOMContentLoaded', configurarLinksSidebar);
</script>

   

<script>

    let profileDropdownList = document.querySelector(".profile-dropdown-list");
    let btn = document.querySelector(".profile-dropdown-btn");
    let classList = profileDropdownList.classList;
    const toggle = () => classList.toggle("active");
    window.addEventListener("click", function (e) {
      if (!btn.contains(e.target)) classList.remove("active");
    });
    </script>
